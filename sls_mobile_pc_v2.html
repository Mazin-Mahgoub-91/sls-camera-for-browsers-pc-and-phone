﻿<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLS Camera Fixed</title>
<style>
body { margin:0; background:#000; overflow:hidden; }
video, canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
#msg { position:absolute; top:20px; left:0; width:100%; text-align:center; color:#0f0; font-size:18px; z-index:10; }
</style>
</head>
<body>
<div id="msg">بشغل الكاميرا... وافق على الصلاحية</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<script type="importmap">
{
  "imports": {
    "mediapipe": "http://cdn.jsdelivr.net/.../@me.../pose@0.5.1675469404/+esm"
  }
}
</script>
<script type="module">
import {Pose, POSE_CONNECTIONS} from 'mediapipe';
import {drawConnectors, drawLandmarks} from 'http://cdn.jsdelivr.net/.../drawing_utils@0.3.../+esm';
import {Camera} from 'http://cdn.jsdelivr.net/.../camera_utils@0.3.../+esm';
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');
const pose = new Pose({locateFile: (file) => `http://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
pose.setOptions({modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
pose.onResults((results) => {
  msg.style.display = 'none';
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (results.poseLandmarks) {
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
    drawLandmarks(ctx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 3});
  }
});
navigator.mediaDevices.getUserMedia({video: true})
.then(() => {
  const camera = new Camera(video, {
    onFrame: async () => { await pose.send({image: video}); },
    width: 640, height: 480
  });
  camera.start();
})
.catch(err => {
  msg.innerHTML = 'خطأ الكاميرا: افتح الملف من localhost أو https<br>' + err;
  console.error(err);
