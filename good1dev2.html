<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Pose Lite Win7</title>
<style>
body{margin:0;background:#000;color:#0f0;text-align:center;padding:20px;font-family:tahoma}
button{padding:20px 40px;font-size:18px;background:#0f0;color:#000;border:none;border-radius:10px;cursor:pointer}
video{width:640px;height:480px;border:3px solid #0f0;margin-top:15px}
#log{background:#111;border:2px solid #0f0;padding:10px;margin-top:15px;text-align:right;color:yellow;min-height:120px}
</style>
</head>
<body>
<h3>تجربة الهيكل الخفيف</h3>
<button onclick="start()">ابدأ</button>
<video id="v" autoplay playsinline muted></video>
<div id="log"></div>

<script type="module">
import {PoseLandmarker, FilesetResolver} from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

const log = t => document.getElementById('log').innerHTML += t + '<br>';
const video = document.getElementById('v');
let pose, vision;

async function start(){
  log('1. كاميرا...');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {width: 640, height: 480} // شلنا exact عشان أوبرا
  });
  video.srcObject = stream;
  await video.play();
  log('2. فيديو شغال');

  log('3. تحميل الموديل...');
  vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");

  pose = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "CPU" // نجبره يشتغل CPU بس عشان 32bit
    },
    runningMode: "IMAGE", // غيرنا من VIDEO لـ IMAGE عشان أوبرا
    numPoses: 1
  });
  log('4. الموديل اتحمل ✅ ببدأ الكشف...');

  setInterval(async ()=>{
    if(video.readyState >= 2){
      const result = await pose.detect(video); // بدون time
      if(result.landmarks.length > 0){
        log('5. جسم مكتشف! عدد النقاط: '+result.landmarks[0].length+' 💀');
      } else {
        log('...بفتش في الجسم');
      }
    }
  }, 500); // كل نص ثانية بس عشان ما يعلق
}
window.start = start;
</script>
</body>
</html>
