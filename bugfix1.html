<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLS Camera Fixed</title>
<style>
body { margin:0; background:#000; overflow:hidden; color:#0f0; font-family:monospace }
video, canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover }
#msg { position:absolute; top:20px; left:0; width:100%; text-align:center; color:#0f0; font-size:18px; z-index:10; text-shadow:0 0 10px #0f0 }
#start { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); padding:22px 50px; font-size:20px; font-weight:bold; background:#0f0; color:#000; border:none; border-radius:12px; z-index:20; box-shadow:0 0 15px #0f0 }
#logBox { position:absolute; bottom:0; left:0; width:100%; max-height:140px; background:rgba(17,17,17,0.9); border-top:2px solid #0f0; padding:10px; text-align:right; font-size:12px; color:yellow; overflow-y:auto; z-index:20 }
.step{margin:3px 0} .ok{color:#0f0} .err{color:#ff5555}
</style>
</head>
<body>
<div id="msg">اضغط الزر لتشغيل الكاميرا</div>
<button id="start">شغل الكاميرا</button>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="logBox"><div class="step">1. الصفحة جاهزة...</div></div>

<script type="importmap">
{
  "imports": {
    "mediapipe": "https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/+esm"
  }
}
</script>

<script type="module">
import {Pose, POSE_CONNECTIONS} from 'mediapipe';
import {drawConnectors, drawLandmarks} from 'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466861/+esm';
import {Camera} from 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466861/+esm';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');
const logBox = document.getElementById('logBox');
const btn = document.getElementById('start');

function addLog(t, c='step'){
  const d = document.createElement('div');
  d.className = 'step ' + c;
  d.textContent = t;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
pose.setOptions({modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});

pose.onResults((results) => {
  msg.style.display = 'none';
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (results.poseLandmarks) {
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
    drawLandmarks(ctx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 3});
  }
});

btn.onclick = async () => {
  btn.style.display = 'none';
  addLog('2. الزر اتضغط ✅', 'ok');
  
  try {
    addLog('3. بطلب صلاحية الكاميرا...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: 'environment', width: {ideal: 1280}, height: {ideal: 720}}
    });
    addLog('4. الكاميرا اشتغلت 📷', 'ok');
    
    video.srcObject = stream;
    addLog('5. الفيديو مربوط بالفيديو تاق', 'ok');
    
    await video.play();
    addLog('6. الفيديو شغال... ببدأ التحليل', 'ok');
    
    const camera = new Camera(video, {
      onFrame: async () => { await pose.send({image: video}); },
      width: 1280, height: 720
    });
    camera.start();
    addLog('7. MediaPipe شغال ✅ حرك يدك', 'ok');

  } catch(err) {
    addLog('خطأ: ' + err.name, 'err');
    addLog('التفاصيل: ' + err.message, 'err');
    msg.innerHTML = 'فشل: افتح من https github.io<br>' + err.name;
    btn.style.display = 'block';
    console.error(err);
  }
};
</script>
</body>
</html>
