<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Pose Debug</title>
<style>
body{margin:0;background:#000;color:#0f0;text-align:center;padding:10px;font-family:tahoma}
#box{position:relative;display:inline-block}
video, canvas{width:640px;height:480px;border:3px solid #0f0}
canvas{position:absolute;top:0;left:0}
button{padding:15px 30px;font-size:18px;background:#0f0;color:#000;border:none;margin:5px}
#log{background:#111;border:2px solid red;padding:8px;margin-top:8px;text-align:right;color:yellow;font-size:13px;height:150px;overflow-y:auto}
</style>
</head>
<body>
<h3>pose estimation : skeleton tracker</h3>
<button onclick="start()">1. شغل</button>
<button onclick="testPose()">2. اختبر Pose يدوي</button>
<div id="box">
  <video id="v" autoplay playsinline muted></video>
  <canvas id="c" width="640" height="480"></canvas>
</div>
<div id="log">اضغط 1 ثم 2<br></div>

<script type="module">
import {PoseLandmarker, FilesetResolver, DrawingUtils} from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

const log = t => {document.getElementById('log').innerHTML += t + '<br>'; console.log(t)};
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let pose, drawingUtils, frameCount = 0;

window.start = async function(){
  log('=== 1. فتح الكاميرا ===');
  const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
  video.srcObject = stream;
  await video.play();
  log('كاميرا شغالة ✅');
}

window.testPose = async function(){
  log('=== 2. تحميل Pose ===');
  try{
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    log('WASM اتحمل ✅');

    pose = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "CPU"
      },
      runningMode: "IMAGE", // مهم: IMAGE ما VIDEO
      numPoses: 1
    });
    log('الموديل اتحمل ✅');

    drawingUtils = new DrawingUtils(ctx);
    frameCount = 0;

    // نجرب كل 1 ثانية عشان ما نضغط المعالج
    setInterval(async ()=>{
      if(video.readyState >= 2){
        frameCount++;
        log('فريم '+frameCount+'... بفحص');

        const result = await pose.detect(video); // بدون timestamp

        if(result.landmarks && result.landmarks.length > 0){
          ctx.clearRect(0,0,640,480);
          drawingUtils.drawLandmarks(result.landmarks[0], {color: '#0f0', lineWidth: 3});
          drawingUtils.drawConnectors(result.landmarks[0], PoseLandmarker.POSE_CONNECTIONS, {color: '#ff0', lineWidth: 2});
          log('💀 جسم مكتشف! نقاط: '+result.landmarks[0].length);
        } else {
          log('ما في جسم في الفريم ده');
        }
      }
    }, 1000);

  }catch(e){
    log('خطأ: '+e.name+' - '+e.message);
  }
}
</script>
</body>
</html>
