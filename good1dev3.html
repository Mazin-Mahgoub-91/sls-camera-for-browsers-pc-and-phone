<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>يد هيكل عظمي</title>
<style>
body{margin:0;background:#000;color:#0f0;text-align:center;padding:20px}
#box{position:relative;display:inline-block}
video, canvas{width:640px;height:480px;border:3px solid #0f0}
canvas{position:absolute;top:0;left:0}
button{padding:15px 30px;font-size:18px;background:#0f0;color:#000;border:none;margin:10px;cursor:pointer}
#log{background:#111;border:2px solid #0f0;padding:10px;margin-top:10px;text-align:right;color:yellow}
</style>
</head>
<body>
<h3>🖐️ هيكل اليد شغال 100% على ويندوز 7</h3>
<button onclick="start()">شغل</button>
<div id="box">
  <video id="v" autoplay playsinline muted></video>
  <canvas id="c" width="640" height="480"></canvas>
</div>
<div id="log">حرك يدك قدام الكاميرا<br></div>

<script type="module">
import {HandLandmarker, FilesetResolver, DrawingUtils} from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

const log = t => document.getElementById('log').innerHTML += t + '<br>';
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let handLandmarker, drawingUtils;

async function start(){
  log('1. كاميرا 640x480...');
  const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
  video.srcObject = stream;
  await video.play();
  log('2. فيديو شغال ✅');

  log('3. تحميل موديل اليد...');
  const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"},
    runningMode: "VIDEO",
    numHands: 1
  });
  drawingUtils = new DrawingUtils(ctx);
  log('4. جاهز! حرك أصابعك 👇');

  let lastTime = -1;
  function predict(){
    ctx.clearRect(0,0,640,480);
    if(video.currentTime!== lastTime){
      const result = handLandmarker.detectForVideo(video, performance.now());
      if(result.landmarks.length > 0){
        // رسم الهيكل
        drawingUtils.drawLandmarks(result.landmarks[0], {color: '#0f0', lineWidth: 4});
        drawingUtils.drawConnectors(result.landmarks[0], HandLandmarker.HAND_CONNECTIONS, {color: '#ff0', lineWidth: 3});
        log('🖐️ يد مكتشفة - 21 نقطة شغالة');
      }
      lastTime = video.currentTime;
    }
    requestAnimationFrame(predict);
  }
  predict();
}
window.start = start;
</script>
</body>
</html>
